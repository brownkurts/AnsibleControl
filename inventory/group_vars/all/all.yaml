---
ansible_python_interpreter: /usr/bin/python3
ansible_become_method: sudo

os: "linux"
arch: "amd64"

vip: "192.168.201.50"
k3s_api_vip: "192.168.201.50"
k3s_primary_server_ip: "192.168.201.51"
k3s_iface: "eth0"

metallb_version: "v0.14.9"
lb_range: "192.168.201.60-192.168.201.90"
lb_pool_name: "first-pool"

proxmox_api_host: "192.168.2.201"
proxmox_api_user: "root@pam"
proxmox_api_token_id: "ansible"
proxmox_validate_certs: false

proxmox_template_image_dir: "/var/lib/vz/template/qcow2"
proxmox_template_snippet_storage: "local"
proxmox_template_agent: 1
proxmox_template_bridge: "vmbr0"
proxmox_template_ciuser: "kurt"
proxmox_template_nameserver: "1.1.1.1"
proxmox_template_searchdomain: "brown.local"
proxmox_template_memory: 2048
proxmox_template_cores: 2
proxmox_template_sockets: 1
proxmox_template_cpu: "x86-64-v2-AES"
proxmox_template_scsihw: "virtio-scsi-pci"
proxmox_template_disk_format: "qcow2"
proxmox_template_storage_default: "local-lvm"
proxmox_template_network_model: "virtio"
proxmox_template_ostype: "l26"
proxmox_template_onboot: false
proxmox_template_balloon: 0

proxmox_ubuntu_template:
  template_name_prefix: "tpl-ubuntu-2404"
  image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
  image_filename: "noble-server-cloudimg-amd64.img"
  checksum_url: "https://cloud-images.ubuntu.com/noble/current/SHA256SUMS"
  image_checksum_algorithm: "sha256"
  ssh_public_key_file: "~/.ssh/id_ed25519.pub"
  reboot_after_template_build: false
  force_rebuild: false

proxmox_template_targets:
  - node: "PROXMOX-01"
    vmid: 9001
    name_suffix: "proxmox-01"
    storage: "local-lvm"

  - node: "proxmox03"
    vmid: 9002
    name_suffix: "proxmox03"
    storage: "local-lvm"

  - node: "proxmox05"
    vmid: 9003
    name_suffix: "proxmox05"
    storage: "ceph"

k3s_version: "v1.31"
k3s_version_channel: "v1.31"
k3s_cluster_token: "CHANGE_ME_LONG_RANDOM_TOKEN"
k3s_disable_traefik: false
k3s_disable_servicelb: true
k3s_write_kubeconfig_mode: "0644"

k3s_node_cidr: "192.168.201.0/24"
k3s_gateway: "192.168.201.1"
k3s_dns_servers:
  - "1.1.1.1"
  - "8.8.8.8"

k3s_servers:
  - name: "k3s-1"
    vmid: 2101
    proxmox_node: "PROXMOX-01"
    clone_template: "tpl-ubuntu-2404-proxmox-01"
    ip: "192.168.201.51"
    cidr: 24
    gateway: "192.168.201.1"
    vlan_tag: 201
    cores: 4
    memory: 8192
    disk_gb: 80
    longhorn_disk_gb: 100
    storage: "local-lvm"

  - name: "k3s-2"
    vmid: 2102
    proxmox_node: "proxmox03"
    clone_template: "tpl-ubuntu-2404-proxmox03"
    ip: "192.168.201.52"
    cidr: 24
    gateway: "192.168.201.1"
    vlan_tag: 201
    cores: 4
    memory: 8192
    disk_gb: 80
    longhorn_disk_gb: 100
    storage: "local-lvm"

  - name: "k3s-3"
    vmid: 2103
    proxmox_node: "proxmox05"
    clone_template: "tpl-ubuntu-2404-proxmox05"
    ip: "192.168.201.53"
    cidr: 24
    gateway: "192.168.201.1"
    vlan_tag: 201
    cores: 4
    memory: 8192
    disk_gb: 80
    longhorn_disk_gb: 100
    storage: "ceph"

kube_vip_version: "v0.8.9"

longhorn_version: "1.11.0"
longhorn_default_replica_count: 2
longhorn_data_path: "/var/lib/longhorn"

# ----------------------------
# Pi-hole HA
# ----------------------------
pihole_vip: "192.168.2.2"
pihole_iface: "eth0"
pihole_gateway: "192.168.2.254"
pihole_cidr: 24

pihole_keepalived_router_id: 52
pihole_keepalived_auth_pass: "steven87"

pihole_web_password: "steven87"
pihole_dns_1: "1.1.1.1"
pihole_dns_2: "1.0.0.1"

pihole_install_web_server: true
pihole_install_web_interface: true
pihole_lighttpd_enabled: true
pihole_dnsmasq_listening: "all"
pihole_query_logging: true

pihole_servers:
  - name: "pihole-ha-1"
    vmid: 2301
    proxmox_node: "PROXMOX-01"
    clone_template: "tpl-ubuntu-2404-proxmox-01"
    ip: "192.168.2.3"
    cidr: 24
    gateway: "192.168.2.254"
    vlan_tag: 1
    cores: 2
    memory: 2048
    disk_gb: 20
    storage: "local-lvm"
    keepalived_state: "MASTER"
    keepalived_priority: 200

  - name: "pihole-ha-2"
    vmid: 2302
    proxmox_node: "proxmox03"
    clone_template: "tpl-ubuntu-2404-proxmox03"
    ip: "192.168.2.4"
    cidr: 24
    gateway: "192.168.2.254"
    vlan_tag: 1
    cores: 2
    memory: 2048
    disk_gb: 20
    storage: "local-lvm"
    keepalived_state: "BACKUP"
    keepalived_priority: 100