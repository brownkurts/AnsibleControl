---
# ansible-playbook -i inventory/hosts.ini playbooks/proxmox/pve8_to_9_test_vm.yml --limit pve-auto

- name: Upgrade standalone Proxmox VE 8.4 test VM to Proxmox VE 9
  hosts: all
  gather_facts: true
  become: true

  vars:
    reboot_timeout_seconds: 1800
    pve_upgrade_remove_systemd_boot: true
    pve_upgrade_install_microcode: true
    pve_upgrade_disable_enterprise_repos: true

  environment:
    DEBIAN_FRONTEND: noninteractive
    APT_LISTCHANGES_FRONTEND: none
    NEEDRESTART_MODE: a

  pre_tasks:
    - name: Confirm this is Proxmox VE
      ansible.builtin.command: pveversion
      register: _pveversion
      changed_when: false

    - name: Show current Proxmox version
      ansible.builtin.debug:
        msg: "{{ _pveversion.stdout }}"

    - name: Stop if node is already PVE 9
      ansible.builtin.meta: end_host
      when: "'pve-manager/9.' in _pveversion.stdout or 'pve-manager: 9.' in _pveversion.stdout"

    - name: Confirm node is currently PVE 8
      ansible.builtin.assert:
        that:
          - "'pve-manager/8.' in _pveversion.stdout or 'pve-manager: 8.' in _pveversion.stdout"
        fail_msg: "This playbook is only for upgrading PVE 8.x to PVE 9.x."

    - name: Check for running guests
      ansible.builtin.shell: |
        set -euo pipefail
        qm list | awk 'NR>1 && $3 == "running" {print "VM " $1 " " $2 " is running"}'
        pct list | awk 'NR>1 && $2 == "running" {print "CT " $1 " is running"}'
      args:
        executable: /bin/bash
      register: _running_guests
      changed_when: false
      failed_when: _running_guests.stdout | trim | length > 0

  tasks:
    - name: Disable apt-listchanges prompts
      ansible.builtin.copy:
        dest: /etc/apt/listchanges.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [apt]
          frontend=none
          email_address=root
          confirm=false
          save_seen=/var/lib/apt/listchanges.db
          which=news

    - name: Remove apt-listchanges package to avoid upgrade prompts
      ansible.builtin.shell: |
        set -euo pipefail
        apt-get remove --purge -y apt-listchanges || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove old Ceph repo files for test VM
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/ceph.list
        - /etc/apt/sources.list.d/ceph.sources

    - name: Remove old enterprise repo files for test VM
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/pve-enterprise.list
        - /etc/apt/sources.list.d/pve-enterprise.sources
      when: pve_upgrade_disable_enterprise_repos | bool

    - name: Write Debian Bookworm sources with non-free-firmware
      ansible.builtin.copy:
        dest: /etc/apt/sources.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb http://deb.debian.org/debian bookworm main contrib non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free-firmware

    - name: Write PVE 8 no-subscription repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-subscription.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription

    - name: Update PVE 8 package cache
      ansible.builtin.shell: |
        set -euo pipefail
        apt-get update
      args:
        executable: /bin/bash
      changed_when: false

    - name: Fully update current PVE 8 system before major upgrade
      ansible.builtin.shell: |
        set -euo pipefail
        apt-get -y \
          -o Dpkg::Options::="--force-confdef" \
          -o Dpkg::Options::="--force-confold" \
          dist-upgrade
      args:
        executable: /bin/bash
      register: _bookworm_upgrade
      changed_when: "'0 upgraded, 0 newly installed, 0 to remove' not in _bookworm_upgrade.stdout"

    - name: Check if systemd-boot meta-package is installed
      ansible.builtin.shell: |
        dpkg-query -W -f='${Status}' systemd-boot 2>/dev/null | grep -q "install ok installed"
      args:
        executable: /bin/bash
      register: _systemd_boot_installed
      changed_when: false
      failed_when: false

    - name: Remove systemd-boot meta-package if installed
      ansible.builtin.shell: |
        set -euo pipefail
        apt-get remove -y systemd-boot
      args:
        executable: /bin/bash
      when:
        - pve_upgrade_remove_systemd_boot | bool
        - _systemd_boot_installed.rc == 0

    - name: Install Intel microcode if Intel CPU
      ansible.builtin.shell: |
        set -euo pipefail
        apt-get install -y intel-microcode
      args:
        executable: /bin/bash
      when:
        - pve_upgrade_install_microcode | bool
        - ansible_processor | join(' ') is search('Intel')

    - name: Install AMD microcode if AMD CPU
      ansible.builtin.shell: |
        set -euo pipefail
        apt-get install -y amd64-microcode
      args:
        executable: /bin/bash
      when:
        - pve_upgrade_install_microcode | bool
        - ansible_processor | join(' ') is search('AMD')

    - name: Finish any pending package configuration before precheck
      ansible.builtin.shell: |
        set -euo pipefail
        dpkg --configure -a
        apt-get -f install -y \
          -o Dpkg::Options::="--force-confdef" \
          -o Dpkg::Options::="--force-confold"
      args:
        executable: /bin/bash

    - name: Run pve8to9 precheck after fixes
      ansible.builtin.command: pve8to9 --full
      register: _pve8to9_precheck
      changed_when: false
      failed_when: false

    - name: Show pve8to9 precheck
      ansible.builtin.debug:
        var: _pve8to9_precheck.stdout_lines

    - name: Fail if pve8to9 still reports failures
      ansible.builtin.fail:
        msg: "{{ _pve8to9_precheck.stdout }}"
      when:
        - "'FAILURES:' in _pve8to9_precheck.stdout"
        - "'FAILURES: 0' not in _pve8to9_precheck.stdout"

    - name: Write Debian Trixie sources
      ansible.builtin.copy:
        dest: /etc/apt/sources.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb http://deb.debian.org/debian trixie main contrib non-free-firmware
          deb http://deb.debian.org/debian trixie-updates main contrib non-free-firmware
          deb http://security.debian.org/debian-security trixie-security main contrib non-free-firmware

    - name: Write Proxmox VE 9 no-subscription repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-subscription.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb http://download.proxmox.com/debian/pve trixie pve-no-subscription

    - name: Remove old Ceph repo files again after Trixie switch
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/ceph.list
        - /etc/apt/sources.list.d/ceph.sources

    - name: Remove old enterprise repo files again after Trixie switch
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/pve-enterprise.list
        - /etc/apt/sources.list.d/pve-enterprise.sources
      when: pve_upgrade_disable_enterprise_repos | bool

    - name: Make sure no Bookworm repo files remain enabled
      ansible.builtin.shell: |
        set -euo pipefail

        for f in /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
          [ -e "$f" ] || continue
          if grep -qi "bookworm" "$f"; then
            sed -i 's/^[[:space:]]*deb /# deb /g' "$f" || true
            sed -i 's/^Enabled:[[:space:]]*yes/Enabled: no/Ig' "$f" || true
          fi
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Update apt cache for Trixie/PVE9
      ansible.builtin.shell: |
        set -euo pipefail
        apt-get update
      args:
        executable: /bin/bash
      changed_when: false

    - name: Perform non-interactive major dist-upgrade to PVE 9
      ansible.builtin.shell: |
        set -euo pipefail

        export DEBIAN_FRONTEND=noninteractive
        export APT_LISTCHANGES_FRONTEND=none
        export NEEDRESTART_MODE=a
        export UCF_FORCE_CONFOLD=1

        apt-get -y \
          -o Dpkg::Options::="--force-confdef" \
          -o Dpkg::Options::="--force-confold" \
          -o APT::Get::Assume-Yes=true \
          dist-upgrade
      args:
        executable: /bin/bash
      register: _pve9_upgrade
      changed_when: true

    - name: Finish package configuration after upgrade
      ansible.builtin.shell: |
        set -euo pipefail

        export DEBIAN_FRONTEND=noninteractive
        export APT_LISTCHANGES_FRONTEND=none
        export NEEDRESTART_MODE=a
        export UCF_FORCE_CONFOLD=1

        dpkg --configure -a

        apt-get -f install -y \
          -o Dpkg::Options::="--force-confdef" \
          -o Dpkg::Options::="--force-confold"

        apt-get autoremove --purge -y
      args:
        executable: /bin/bash

    - name: Final repo cleanup - remove old Ceph and enterprise repo files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/ceph.list
        - /etc/apt/sources.list.d/ceph.sources
        - /etc/apt/sources.list.d/pve-enterprise.list
        - /etc/apt/sources.list.d/pve-enterprise.sources

    - name: Final apt update after repo cleanup
      ansible.builtin.shell: |
        set -euo pipefail
        apt-get update
      args:
        executable: /bin/bash
      changed_when: false

    - name: Reboot into PVE 9 kernel
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout_seconds }}"
        msg: "Rebooting after Proxmox VE 8 to 9 upgrade"
        test_command: "pveversion >/dev/null 2>&1"

    - name: Get final Proxmox version
      ansible.builtin.command: pveversion -v
      register: _pveversion_final
      changed_when: false

    - name: Show final version
      ansible.builtin.debug:
        var: _pveversion_final.stdout_lines

    - name: Verify node is now PVE 9
      ansible.builtin.assert:
        that:
          - "'pve-manager: 9.' in _pveversion_final.stdout or 'pve-manager/9.' in _pveversion_final.stdout"
        fail_msg: "Upgrade completed, but pve-manager does not show version 9.x."

    - name: Show Debian version
      ansible.builtin.command: cat /etc/os-release
      register: _os_release
      changed_when: false

    - name: Show OS release
      ansible.builtin.debug:
        var: _os_release.stdout_lines

    - name: Show active apt repositories
      ansible.builtin.shell: |
        set -euo pipefail
        grep -RhvE '^[[:space:]]*#|^[[:space:]]*$' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
      args:
        executable: /bin/bash
      register: _active_repos
      changed_when: false

    - name: Print active apt repositories
      ansible.builtin.debug:
        var: _active_repos.stdout_lines