<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-labelledby="title desc">
  <title id="title">Stargate Command Wazuh Logo</title>
  <desc id="desc">A Stargate-inspired ring mark with Wazuh command branding.</desc>
  <defs>
    <linearGradient id="ring" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#84f7ff"/>
      <stop offset="45%" stop-color="#2eb4ff"/>
      <stop offset="100%" stop-color="#0b3b6f"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#dffcff"/>
      <stop offset="100%" stop-color="#87d9ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="220" fill="#07111f"/>
  <g transform="translate(110 110)" filter="url(#glow)">
    <circle r="74" fill="none" stroke="url(#ring)" stroke-width="10"/>
    <circle r="58" fill="none" stroke="#123a63" stroke-width="2"/>
    <circle r="42" fill="none" stroke="#84f7ff" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M0-58 L14-38 L44-33 L25-11 L30 20 L0 6 L-30 20 L-25-11 L-44-33 L-14-38 Z" fill="#9df4ff" fill-opacity="0.14" stroke="#9df4ff" stroke-opacity="0.5" stroke-width="1.5"/>
  </g>
  <g fill="url(#text)" font-family="Verdana, Geneva, sans-serif">
    <text x="220" y="92" font-size="46" letter-spacing="6">STARGATE COMMAND</text>
    <text x="220" y="146" font-size="28" letter-spacing="9">WAZUH SECURITY GATEWAY</text>
    <text x="220" y="182" font-size="16" letter-spacing="4" fill="#7bb7da">KBTECH HOMELAB SOC</text>
  </g>
</svg>
