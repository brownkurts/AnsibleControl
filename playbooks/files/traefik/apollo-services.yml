        - url: http://192.168.201.71:8096
    jellyseerr:
      loadBalancer:
        servers:
        - url: http://192.168.201.71:5055
    portainer:
      loadBalancer:
        servers:
        - url: http://192.168.201.71:9000
    prowlarr:
