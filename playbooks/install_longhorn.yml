---
- name: Install Longhorn
  hosts: k3s-1
  become: true
  gather_facts: false

  tasks:
    - name: Install Helm if missing
      ansible.builtin.shell: |
        if ! command -v helm >/dev/null 2>&1; then
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Add Longhorn Helm repo
      ansible.builtin.command: helm repo add longhorn https://charts.longhorn.io
      failed_when: false
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Create Longhorn values file
      ansible.builtin.copy:
        dest: /root/longhorn-values.yaml
        mode: "0644"
        content: |
          defaultSettings:
            defaultReplicaCount: {{ longhorn_default_replica_count }}
            defaultDataPath: {{ longhorn_data_path }}
          persistence:
            defaultClass: false

    - name: Install Longhorn
      ansible.builtin.command: >
        helm upgrade --install longhorn longhorn/longhorn
        --namespace longhorn-system
        --create-namespace
        --version {{ longhorn_version }}
        --values /root/longhorn-values.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    - name: Wait for Longhorn deployment
      ansible.builtin.shell: |
        /usr/local/bin/kubectl -n longhorn-system rollout status deploy/longhorn-driver-deployer --timeout=600s
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false