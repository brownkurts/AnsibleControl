---
- name: Bootstrap ansible-pull on managed Linux servers
  hosts: "{{ ansible_pull_target | default('control:ubuntu:nextcloud:tactical_hosts:docker:k3s_cluster:pihole') }}"
  become: true
  gather_facts: true

  vars:
    ansible_pull_repo_url: "https://github.com/brownkurts/ansible_pull_servers.git"
    ansible_pull_branch: "main"
    ansible_pull_playbook: "local.yml"
    ansible_pull_inventory: "localhost,"
    ansible_pull_limit: "localhost"

    ansible_pull_git_username: "brownkurts"
    ansible_pull_git_token: "{{ vault_github_pat }}"

    ansible_pull_enable_cron: true
    ansible_pull_run_now: false
    ansible_pull_cron_minute: "*/10"
    ansible_pull_log_file: "/var/log/ansible-pull-servers.log"

  tasks:
    - name: Validate required GitHub token
      ansible.builtin.assert:
        that:
          - ansible_pull_git_token is defined
          - ansible_pull_git_token | length > 0
        fail_msg: "vault_github_pat must be defined."

    - name: Install required packages
      ansible.builtin.package:
        name:
          - ansible
          - git
        state: present

    - name: Install required ansible-pull collection
      ansible.builtin.command: ansible-galaxy collection install ansible.posix
      changed_when: false

    - name: Write root Git credentials
      ansible.builtin.copy:
        dest: /root/.git-credentials
        owner: root
        group: root
        mode: "0600"
        content: |
          https://{{ ansible_pull_git_username }}:{{ ansible_pull_git_token }}@github.com
      no_log: true

    - name: Configure Git credential helper for root
      ansible.builtin.command: git config --global credential.helper store
      environment:
        HOME: /root
      changed_when: false

    - name: Remove legacy ansible-pull cron job
      ansible.builtin.cron:
        name: "ansible-pull"
        user: root
        state: absent
      when: ansible_pull_enable_cron | bool

    - name: Create ansible-pull cron job
      ansible.builtin.cron:
        name: "ansible-pull server bootstrap"
        user: root
        minute: "{{ ansible_pull_cron_minute }}"
        job: >-
          /usr/bin/ansible-pull -o
          -U {{ ansible_pull_repo_url }}
          -C {{ ansible_pull_branch }}
          -i {{ ansible_pull_inventory }}
          -l {{ ansible_pull_limit }}
          {{ ansible_pull_playbook }}
          >> {{ ansible_pull_log_file }} 2>&1
      when: ansible_pull_enable_cron | bool

    - name: Run ansible-pull now
      ansible.builtin.command: >-
        /usr/bin/ansible-pull -o
        -U {{ ansible_pull_repo_url }}
        -C {{ ansible_pull_branch }}
        -i {{ ansible_pull_inventory }}
        -l {{ ansible_pull_limit }}
        {{ ansible_pull_playbook }}
      when: ansible_pull_run_now | bool
      changed_when: true

- name: Enroll in Tactical RMM
  hosts: "{{ ansible_pull_target | default('control:ubuntu:nextcloud:tactical_hosts:docker:k3s_cluster:pihole') }}"
  become: true
  gather_facts: true
  roles:
    - { role: Linuxrmm, tags: [rmm, linuxrmm, tactical] }

- name: Enroll in Wazuh
  hosts: "{{ ansible_pull_target | default('control:ubuntu:nextcloud:tactical_hosts:docker:k3s_cluster:pihole') }}"
  become: true
  gather_facts: true
  serial: 5
  vars:
    wazuh_manager_host: "{{ hostvars[(groups['wazuh_server'] | first)].ansible_host }}"
    wazuh_agent_repo: "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main"
  tasks:
    - name: Validate Wazuh server inventory target exists
      ansible.builtin.assert:
        that:
          - groups['wazuh_server'] | length > 0
        fail_msg: "Define a Wazuh server in inventory before installing agents."

    - name: Repair interrupted dpkg state
      ansible.builtin.command: dpkg --configure -a
      changed_when: false

    - name: Check whether curl and gpg are already installed
      ansible.builtin.shell: command -v curl >/dev/null 2>&1 && command -v gpg >/dev/null 2>&1
      args:
        executable: /bin/bash
      register: wazuh_agent_prereqs
      changed_when: false
      failed_when: false

    - name: Install prerequisites when missing
      ansible.builtin.shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y apt-transport-https curl gnupg
      args:
        executable: /bin/bash
      when: wazuh_agent_prereqs.rc != 0

    - name: Install Wazuh repository keyring
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://packages.wazuh.com/key/GPG-KEY-WAZUH \
          | gpg --dearmor -o /usr/share/keyrings/wazuh.gpg
      args:
        executable: /bin/bash
        creates: /usr/share/keyrings/wazuh.gpg

    - name: Configure Wazuh repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/wazuh.list
        owner: root
        group: root
        mode: "0644"
        content: "{{ wazuh_agent_repo }}\n"

    - name: Refresh Wazuh repository metadata only
      ansible.builtin.shell: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update \
          -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/wazuh.list \
          -o Dir::Etc::sourceparts=- \
          -o APT::Get::List-Cleanup=0
      args:
        executable: /bin/bash

    - name: Check whether Wazuh agent is already installed
      ansible.builtin.command: dpkg-query -W -f='${Status}' wazuh-agent
      register: wazuh_agent_package
      failed_when: false
      changed_when: false

    - name: Install and enroll Wazuh agent
      ansible.builtin.shell: |
        WAZUH_MANAGER='{{ wazuh_manager_host }}' \
        WAZUH_AGENT_NAME='{{ inventory_hostname }}' \
        apt-get install -y wazuh-agent
      args:
        executable: /bin/bash
      when: "'install ok installed' not in wazuh_agent_package.stdout"

    - name: Point ossec.conf at the current manager
      ansible.builtin.replace:
        path: /var/ossec/etc/ossec.conf
        regexp: '(<address>).*?(</address>)'
        replace: '\g<1>{{ wazuh_manager_host }}\g<2>'

    - name: Enable and restart Wazuh agent
      ansible.builtin.systemd:
        name: wazuh-agent
        enabled: true
        daemon_reload: true
        state: restarted

    - name: Disable Wazuh repository after install
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/wazuh.list
        regexp: '^deb '
        replace: '#deb '
