---
# Restore all k8s secrets from vault to the Stargate cluster
# Usage: ansible-playbook playbooks/restore_k8s_secrets.yml
- name: Restore k8s secrets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig: /home/kurt/.kube/config
  tasks:
    - name: Create namespaces
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig }} create namespace {{ item }}
        --dry-run=client -o yaml
      register: ns_yaml
      loop: "{{ vault_k8s_secrets | map(attribute='namespace') | unique | list }}"
      changed_when: false

    - name: Apply namespaces
      ansible.builtin.shell: |
        echo '{{ item.stdout }}' | kubectl --kubeconfig={{ kubeconfig }} apply -f -
      loop: "{{ ns_yaml.results }}"
      loop_control:
        label: "{{ item.item }}"
      changed_when: true

    - name: Create/update secrets
      ansible.builtin.shell: |
        kubectl --kubeconfig={{ kubeconfig }} create secret generic {{ item.name }} \
          --namespace={{ item.namespace }} \
          --type='{{ item.type }}' \
          {% for k, v in item.data.items() %}--from-literal={{ k }}={{ v | quote }} {% endfor %} \
          --dry-run=client -o yaml | kubectl --kubeconfig={{ kubeconfig }} apply -f -
      loop: "{{ vault_k8s_secrets }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"
      no_log: true
      changed_when: true

    - name: Summary
      ansible.builtin.debug:
        msg: "Restored {{ vault_k8s_secrets | length }} secrets across {{ vault_k8s_secrets | map(attribute='namespace') | unique | list | length }} namespaces"
