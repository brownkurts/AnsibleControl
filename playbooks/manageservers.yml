---
- name: Manage Ubuntu servers
  hosts: ubuntu
  become: true
  gather_facts: true
  tags: [ubuntu]
  roles:
    - { role: ipv6-disable, tags: [ipv6] }
    - { role: packages, tags: [packages] }
    - { role: qemu-guest-agent, tags: [qemu] }
    - { role: update_linux, tags: [update] }
    - { role: Linuxrmm, tags: [rmm, linuxrmm, tactical] }
    - { role: reboot, tags: [reboot] }


- name: Manage Tactical RMM server
  hosts: tactical_hosts
  become: true
  gather_facts: true
  serial: 1
  tags: [tactical]

  roles:
    - { role: ipv6-disable, tags: [ipv6] }
    - { role: packages, tags: [packages] }
    - { role: qemu-guest-agent, tags: [qemu] }
    - { role: update_linux, tags: [update] }
    - { role: reboot, tags: [reboot] }

- name: Manage Pi-hole servers
  hosts: pihole
  become: true
  gather_facts: true
  serial: 1
  tags: [pihole]
  roles:
    - { role: ipv6-disable, tags: [ipv6] }
    - { role: packages, tags: [packages] }
    - { role: qemu-guest-agent, tags: [qemu] }
    - { role: update_linux, tags: [update] }
    - { role: PiHole_update, tags: [pihole_update] }
    - { role: Linuxrmm, tags: [rmm, linuxrmm, tactical] }
    - { role: reboot, tags: [reboot] }

