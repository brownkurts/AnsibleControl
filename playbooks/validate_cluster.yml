---
- name: Validate cluster
  hosts: k3s-1
  become: true
  gather_facts: false
  tasks:
    - name: Show nodes
      ansible.builtin.command: /usr/local/bin/kubectl get nodes -o wide
      register: nodes_out
      changed_when: false

    - name: Show Longhorn pods
      ansible.builtin.command: /usr/local/bin/kubectl get pods -n longhorn-system -o wide
      register: longhorn_out
      changed_when: false

    - name: Show MetalLB resources
      ansible.builtin.command: /usr/local/bin/kubectl get all -n metallb-system
      register: metallb_out
      changed_when: false

    - name: Print node output
      ansible.builtin.debug:
        var: nodes_out.stdout_lines

    - name: Print Longhorn output
      ansible.builtin.debug:
        var: longhorn_out.stdout_lines

    - name: Print MetalLB output
      ansible.builtin.debug:
        var: metallb_out.stdout_lines