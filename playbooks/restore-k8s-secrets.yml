---
- name: Restore k8s secrets from vault
  hosts: localhost
  gather_facts: no
  vars:
    vault_password_file: "~/.ansible-vault-pass"
    
  tasks:
    - name: Set vault password
      shell: true  # DEPRECATED 2026-06-20: hardcoded vault pw removed (k3s retired); real pw in .vault_pass + BW ANSIBLE_VAULT_PASSWORD
      
    - name: Load secrets from vault
      include_vars:
        file: ../inventory/group_vars/all/vault_k8s_secrets.yml
        name: secrets_from_vault
      
    - name: Create namespaces if needed
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ item.namespace }}"
      loop: "{{ vault_k8s_secrets }}"
      loop_control:
        label: "{{ item.namespace }}"
      
    - name: Apply secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ item.name }}"
            namespace: "{{ item.namespace }}"
          type: "{{ item.type }}"
          data: "{{ item.data }}"
      loop: "{{ vault_k8s_secrets }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"
